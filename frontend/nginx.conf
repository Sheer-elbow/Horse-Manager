server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10M;

    location /api {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Service worker must be served from root scope with correct headers
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    # PWA manifest
    location = /manifest.json {
        add_header Content-Type "application/manifest+json";
        try_files $uri =404;
    }

    # Hashed JS/CSS/image assets — cache aggressively (content-hash changes on deploy)
    location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html — never cache so the PWA always fetches fresh chunk references
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
