server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10M;

    # ── Security headers (defence-in-depth) ─────────────────────────────────
    # Caddy in front of nginx sets the authoritative copies; these are a
    # backstop in case Caddy is bypassed or misconfigured. CSP rationale:
    #  - 'self' for scripts + SHA-256 hash of the inline PWA registration
    #    script in index.html (avoids 'unsafe-inline' for scripts entirely)
    #  - 'unsafe-inline' required for styles (Tailwind/Vite inject <style>)
    #  - img-src allows data: (inline SVGs) and blob: (AuthenticatedImage)
    #
    # Note: nginx's add_header does NOT inherit into a location block that
    # declares its own add_header, so the headers are repeated in the /sw.js
    # and /manifest.json blocks below.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-PhGHOWGkxtQ4dFEiuzyOoy9Tfe9GHbsL02eJDCAOeU4='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location /api {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Service worker must be served from root scope with correct headers
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        # Re-declare the security headers (add_header is not inherited when a
        # location sets its own).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-PhGHOWGkxtQ4dFEiuzyOoy9Tfe9GHbsL02eJDCAOeU4='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        try_files $uri =404;
    }

    # PWA manifest
    location = /manifest.json {
        add_header Content-Type "application/manifest+json";
        # Re-declare the security headers (add_header is not inherited when a
        # location sets its own).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-PhGHOWGkxtQ4dFEiuzyOoy9Tfe9GHbsL02eJDCAOeU4='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
