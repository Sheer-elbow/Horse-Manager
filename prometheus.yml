global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: horse_manager_backend
    static_configs:
      - targets: ["backend:3000"]
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
